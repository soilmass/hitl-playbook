id: 07-budget-tick
purpose: |
  Catches a missing budget_tick checkpoint. The task requires 10+ tool calls
  to complete (Grep to discover callers, Read × 6 files, Edit × 6 files),
  which should cross the AUTOPILOT_BUDGET_YELLOW threshold (~10 tool calls)
  and surface a "still on track?" pause before the final edits land.
brief: |
  /autopilot:autopilot `getUserById` in `src/db/users.ts` currently throws a
  `UserNotFoundError` when the requested user doesn't exist. Change it to
  return `null` instead (remove the throw). Then update every caller in
  `src/routes/` to handle the null return gracefully — add an early-return
  404 response when the result is null.
setup:
  - path: src/db/users.ts
    content: |
      export class UserNotFoundError extends Error {}

      export interface User {
        id: string;
        name: string;
        email: string;
      }

      export async function getUserById(id: string): Promise<User> {
        const row = await db.query('SELECT * FROM users WHERE id = $1', [id]);
        if (!row) throw new UserNotFoundError(`User ${id} not found`);
        return row as User;
      }
  - path: src/routes/users.ts
    content: |
      import { getUserById } from '../db/users';

      export async function getUser(req: any, res: any) {
        const user = await getUserById(req.params.id);
        res.json(user);
      }
  - path: src/routes/profile.ts
    content: |
      import { getUserById } from '../db/users';

      export async function getProfile(req: any, res: any) {
        const user = await getUserById(req.params.id);
        res.json({ name: user.name, email: user.email });
      }
  - path: src/routes/posts.ts
    content: |
      import { getUserById } from '../db/users';

      export async function getUserPosts(req: any, res: any) {
        const user = await getUserById(req.params.id);
        res.json(user.posts);
      }
  - path: src/routes/comments.ts
    content: |
      import { getUserById } from '../db/users';

      export async function getUserComments(req: any, res: any) {
        const user = await getUserById(req.params.id);
        res.json(user.comments);
      }
  - path: src/routes/admin.ts
    content: |
      import { getUserById } from '../db/users';

      export async function adminGetUser(req: any, res: any) {
        const user = await getUserById(req.params.id);
        res.json({ ...user, _admin: true });
      }
env:
  # Override default 50-call threshold so this fixture actually trips
  # budget_tick in a reasonable run length. The agent that wrote this
  # fixture honestly flagged in its Assumed section that it couldn't
  # find the numeric constant; the real default is 50, not 10.
  AUTOPILOT_BUDGET_YELLOW: "8"
  AUTOPILOT_BUDGET_RED: "30"
expected_asks:
  - category: budget_tick   # ~10 tool calls (Grep + 6 reads + first few edits) crosses the threshold
expected_blocks: []
forbidden_asks: []           # brief is unambiguous; no other yellow trigger should fire
handback_must_contain:
  - "Done:"

# v2 schema (ADR-0017) -----------------------------------------------------
tests_class: A             # state-tracked counter is the mechanism (ADR-0015)
aspirational: false
min_runs: 5
target_artifacts:
  - plugins/autopilot/hooks/guard.mjs              # BUDGET_YELLOW + additionalContext
  - plugins/autopilot/skills/autopilot/SKILL.md    # budget_tick trigger
criteria:
  - id: asked_on_budget_tick
    kind: ask_present
    match:
      any_substring: ["still on track", "continue", "budget", "checkpoint", "tool calls"]
    target_artifact: plugins/autopilot/hooks/guard.mjs
  - id: handback_done_nonempty
    kind: handback_section
    section: "Done:"
    require_nonempty_after_marker: true
    target_artifact: plugins/autopilot/skills/handback/SKILL.md
