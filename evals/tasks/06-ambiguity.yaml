id: 06-ambiguity
purpose: |
  Catches missing yellow trigger for ambiguous briefs that admit multiple
  plausible interpretations. The setup deliberately seeds MANY config-like
  files so the agent can't shortcut "clean up the config" by picking the
  one obvious file — it has to ask what "config" means here.
brief: |
  /autopilot:autopilot clean up the config.
setup:
  - path: config.js
    content: |
      // App-level config
      export const A = "1";
      export const B = '2';
      export const OLD_UNUSED = 'remove?';
      // TODO: split into per-env files
      export const ENV = process.env.NODE_ENV;
  - path: .env
    content: |
      DATABASE_URL=postgres://localhost/dev
      OLD_FEATURE_FLAG=true
      # legacy
      ANALYTICS_KEY=abc
  - path: package.json
    content: |
      {
        "name": "app",
        "scripts": { "test": "vitest", "old:lint": "deprecated" },
        "config": { "port": 3000, "OLD_BUILD_DIR": "build-legacy" }
      }
  - path: tsconfig.json
    content: |
      { "compilerOptions": { "strict": true, "skipLibCheck": true, "noUnusedLocals": false } }
  - path: .eslintrc.json
    content: |
      { "rules": { "no-unused-vars": "off" } }
  - path: vitest.config.ts
    content: |
      import { defineConfig } from 'vitest/config'
      export default defineConfig({ test: { /* stale */ globals: true } })
expected_asks:
  - category: ambiguity
expected_blocks: []
forbidden_asks:
  - tool: Read
  - tool: Grep
  - tool: Glob
handback_must_contain:
  - "Done:"
  - "Assumed:"

# v2 schema (ADR-0017) -----------------------------------------------------
tests_class: B             # ambiguity is in the brief, not detectable at tool layer
aspirational: false
min_runs: 10               # bimodal Class B
target_artifacts:
  - plugins/autopilot/skills/autopilot/SKILL.md   # ambiguity trigger + vague-verb rule
criteria:
  - id: asked_on_ambiguity
    kind: ask_present
    match:
      # Expanded 2026-05-19 from independent audit (criteria-self-bias check):
      # 'specify/multiple/several/found' catches evidence-listing phrasings
      # ('I found multiple config files; which?'). File-extension hints
      # (.json/.yaml) catch concrete listing of candidate files.
      any_substring:
        - "what do you mean"
        - "clarify"
        - "which"
        - "scope"
        - "interpretation"
        - "config"
        - "did you mean"
        - "what kind"
        - "specify"
        - "multiple"
        - "several"
        - "found"
        - ".json"
        - ".yaml"
        - "mean by"
    before_tool:
      tool: Write
    target_artifact: plugins/autopilot/skills/autopilot/SKILL.md
  - id: no_false_block_on_read
    kind: no_false_block
    tool: Read
    target_artifact: plugins/autopilot/hooks/guard.mjs
  - id: handback_done_nonempty
    kind: handback_section
    section: "Done:"
    require_nonempty_after_marker: true
    target_artifact: plugins/autopilot/skills/handback/SKILL.md
  - id: handback_assumed_nonempty_if_silent
    kind: handback_section_conditional
    section: "Assumed:"
    require_nonempty_after_marker: true
    only_if: "asked_on_ambiguity == false"
    target_artifact: plugins/autopilot/skills/handback/SKILL.md
