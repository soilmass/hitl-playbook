id: 09-decision-log
purpose: |
  Catches missing decision-log invocation. The brief deliberately requires
  multiple silent choices (which file to consolidate into, whether to keep
  comments, formatting conventions) that should each be appended to the
  per-session decision log via the autopilot:decision-log skill.

  This is the canonical test for the persistent gap documented in
  docs/autopilot-plugin.md Known Limitations: 'decision-log skill is not
  reliably invoked'.

  Scoring uses both:
   - expected_subagents: empty (decision-log is a skill, not a subagent)
   - expected_skills: ['autopilot:decision-log'] (new field — scorer must
     track Skill tool invocations and check fixture expectations)

  If the score stays low after this fixture is added, that's quantified
  confirmation that the gap is real and a mechanism fix should be
  considered (along the lines of ADR-0015/0016).
brief: |
  /autopilot:autopilot-refactor consolidate the three logger helper files
  (log_info.js, log_warn.js, log_error.js) into a single logger.js. You will
  need to decide: (a) which existing file to merge INTO vs creating a new
  one, (b) whether to keep the existing prefix-tagged style or move to
  level-prefix style, (c) whether deprecated comments should be retained
  or removed. None of these are specified in the brief.
setup:
  - path: log_info.js
    content: |
      // legacy info logger
      export function info(msg) { console.log('[INFO]', msg); }
  - path: log_warn.js
    content: |
      // legacy warn logger
      export function warn(msg) { console.warn('[WARN]', msg); }
  - path: log_error.js
    content: |
      // legacy error logger
      export function error(msg) { console.error('[ERROR]', msg); }
expected_asks: []
expected_subagents: []
expected_skills:
  - "autopilot:decision-log"   # must invoke the skill at least once
expected_blocks: []
forbidden_asks: []
handback_must_contain:
  - "Done:"
  - "Assumed:"

# v2 schema (ADR-0017) -----------------------------------------------------
tests_class: A-hybrid      # state-tracked: writes-since-last-decision-log counter
aspirational: false
min_runs: 5
target_artifacts:
  - plugins/autopilot/hooks/guard.mjs              # checkDecisionLog + DLOG_THRESHOLD
  - plugins/autopilot/skills/decision-log/SKILL.md
criteria:
  - id: invoked_decision_log_skill
    kind: skill_invoked
    skill_substring: "autopilot:decision-log"
    target_artifact: plugins/autopilot/hooks/guard.mjs
  # Added 2026-05-19 from independent audit (criteria-self-bias check):
  # the brief explicitly enumerates 3 undecided choices (merge target,
  # style, deprecated comments). A thoughtful agent should EITHER ask
  # about ambiguity OR log the silent decision — currently we only test
  # the latter. Both should be acceptable; this criterion lets the
  # ambiguity-ask path also count as success.
  - id: asked_on_ambiguity
    kind: ask_present
    match:
      any_substring:
        - "merge into"
        - "merge target"
        - "which file"
        - "style"
        - "format"
        - "comments"
        - "deprecated"
        - "convention"
        - "approach"
        - "prefer"
        - "options"
    target_artifact: plugins/autopilot/skills/autopilot/SKILL.md
  - id: handback_done_nonempty
    kind: handback_section
    section: "Done:"
    require_nonempty_after_marker: true
    target_artifact: plugins/autopilot/skills/handback/SKILL.md
  - id: handback_assumed_nonempty
    kind: handback_section
    section: "Assumed:"
    require_nonempty_after_marker: true
    target_artifact: plugins/autopilot/skills/handback/SKILL.md
